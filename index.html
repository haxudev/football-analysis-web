<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 球赛观察 · 赛前分析</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <h1>AI 球赛观察</h1>
      <p class="tagline">每 12 小时全量复盘 · 重点跟踪赔率变化与舆情</p>
    </div>
  </header>

  <main class="wrap">
    <div class="toolbar">
      <input id="search" type="search" placeholder="搜索球队 / 赛事…" aria-label="搜索" />
      <span id="meta" class="meta"></span>
    </div>
    <section id="cards" class="cards" aria-live="polite"></section>
    <p id="empty" class="empty" hidden>暂无分析报告。</p>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <span id="generated"></span>
      <span class="sep">·</span>
      <span>分析由 LLM 代理生成，仅供研究参考，非投注建议</span>
    </div>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
